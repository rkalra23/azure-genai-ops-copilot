name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Run API tests
    runs-on: ubuntu-latest

    env:
      APP_ENV: test
      LOG_LEVEL: INFO
      AZURE_OPENAI_ENDPOINT: https://example.openai.azure.com/
      AZURE_OPENAI_API_KEY: dummy
      AZURE_OPENAI_API_VERSION: 2024-02-15-preview
      AZURE_OPENAI_CHAT_DEPLOYMENT: dummy-chat
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: dummy-embedding
      AZURE_SEARCH_ENDPOINT: https://example.search.windows.net
      AZURE_SEARCH_API_KEY: dummy
      AZURE_SEARCH_INDEX_NAME: dummy-index
      DEFAULT_RETRIEVAL_MODE: hybrid
      DEFAULT_TOP_K: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -f api/Dockerfile -t azure-genai-ops-copilot:ci .