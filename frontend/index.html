<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azure GenAI Ops Copilot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Azure GenAI Ops Copilot</h1>
    <p class="subtitle">Ask questions about indexed operational documents</p>

    <label for="question">Question</label>
    <textarea id="question" placeholder="Example: How do I restart billing service?"></textarea>

    <div class="controls">
      <div class="control-group">
        <label for="retrievalMode">Retrieval mode</label>
        <select id="retrievalMode">
          <option value="keyword">Keyword</option>
          <option value="vector">Vector</option>
          <option value="hybrid" selected>Hybrid</option>
        </select>
      </div>

      <div class="control-group">
        <label for="topK">Top K</label>
        <select id="topK">
          <option value="3">3</option>
          <option value="5" selected>5</option>
          <option value="7">7</option>
        </select>
      </div>
    </div>

    <button id="askBtn">Ask</button>

    <div class="section">
      <h2>Answer</h2>
      <div id="answer" class="card">No response yet.</div>
    </div>

    <div class="section">
      <h2>Sources</h2>
      <ul id="sources" class="card sources-list"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
